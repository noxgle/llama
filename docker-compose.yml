services:
  llama-server:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
      args:
        LLAMA_REPO: "${LLAMA_REPO:-https://github.com/ggml-org/llama.cpp.git}"
        LLAMA_REF: "${LLAMA_REF:-master}"
        BUILD_JOBS: "6"
    ports:
      - "${PORT:-8089}:${PORT:-8089}"
    volumes:
      - hf-cache:/root/.cache/huggingface
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command:
      - "-hf"
      - "${MODEL:-unsloth/gemma-4-E4B-it-GGUF:UD-Q4_K_XL}"
      - "--jinja"
      - "-c"
      - "${CTX:-65536}"
      - "-n"
      - "${N_PREDICT:--1}"
      - "--port"
      - "${PORT:-8089}"
      - "--host"
      - "${HOST:-0.0.0.0}"
      - "-ngl"
      - "${NGLAYERS:-40}"
      - "-ot"
      - "${CPUMOE:-exps=CPU}"
      - "-fa"
      - "${FLASHATTN:-on}"
      - "-b"
      - "${BATCH:-1024}"
      - "-ub"
      - "${UBATCH:-1024}"
      - "-t"
      - "${THREADS:-6}"
      - "--threads-batch"
      - "${THREADS_BATCH:-6}"
      - "--parallel"
      - "${PARALLEL:-2}"
      - "--poll"
      - "${POLL:-50}"
      - "--mlock"
      - "--fit"
      - "off"
      - "-ctk"
      - "${CACHE_TYPE_K:-q4_0}"
      - "-ctv"
      - "${CACHE_TYPE_V:-q4_0}"
      - "--no-mmap"
      - "--ctx-checkpoints"
      - "${CTX_CHECKPOINTS:-4}"
      - "--no-mmproj"
      # MTP speculative decoding (upstream PR #22673)
      - "--spec-type"
      - "${SPEC_TYPE:-none}"
      - "--spec-draft-n-max"
      - "${SPEC_DRAFT_N_MAX:-3}"

volumes:
  hf-cache:
