services:
  llama-server:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PR_NUMBER: "21343"
        BUILD_JOBS: "6"
        GH_TOKEN: ${GH_TOKEN:-}
    ports:
      - "${PORT:-8089}:${PORT:-8089}"
    volumes:
      - hf-cache:/root/.cache/huggingface
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command:
      - "-hf"
      - "${MODEL:-unsloth/gemma-4-E4B-it-GGUF:UD-Q4_K_XL}"
      - "--jinja"
      - "-c"
      - "${CTX:-65536}"
      - "--port"
      - "${PORT:-8089}"
      - "--host"
      - "${HOST:-0.0.0.0}"
      - "-ngl"
      - "${NGLAYERS:-40}"
      - "-ot"
      - "${CPUMOE:-exps=CPU}"
      - "-fa"
      - "${FLASHATTN:-on}"
      - "-b"
      - "${BATCH:-1024}"
      - "-ub"
      - "${UBATCH:-1024}"
      - "-t"
      - "${THREADS:-6}"
      - "--mlock"
      - "--fit"
      - "off"
      - "-ctk"
      - "${CACHE_TYPE_K:-q4_0}"
      - "-ctv"
      - "${CACHE_TYPE_V:-q4_0}"
      - "--no-mmap"

volumes:
  hf-cache: