version = 1

; ------------------------------------------------------------------
; Global settings — apply to all models unless overridden
; ------------------------------------------------------------------
[*]
flash-attn = on
no-mmap = 1
no-mmproj = 1
threads = 6
threads-batch = 6
parallel = 1
poll = 50
cache-type-k = q4_0
cache-type-v = q4_0
ctx-checkpoints = 4

; ==================================================================
; Qwen3.6 35B A3B MTP — Q4_K_M (default, ~30.5 tok/s)
; Uses HuggingFace download (-hf), model cached in the HF volume
; ==================================================================
[qwen-q4]
hf = unsloth/Qwen3.6-35B-A3B-MTP-GGUF:UD-Q4_K_M
ctx-size = 163840
batch-size = 3072
ubatch-size = 1536
n-gpu-layers = 999
cpu-moe = true
spec-type = draft-mtp
spec-draft-n-max = 2

; ==================================================================
; Qwen3.6 35B A3B MTP — Q5_K_M (higher quality, ~28.6 tok/s)
; Uses local GGUF file (downloaded via curl, see install-llama.sh qwen-q5)
; ==================================================================
[qwen-q5]
model = /models/qwen-q5-k-m.gguf
ctx-size = 163840
batch-size = 3072
ubatch-size = 1536
n-gpu-layers = 999
cpu-moe = true
spec-type = draft-mtp
spec-draft-n-max = 2
